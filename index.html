/* ─── CSV Parser & Loader ─── */
const parseCSV = (text) => {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
  return lines.slice(1).map((line, idx) => {
    const values = line.split(',').map(v => v.trim().replace(/"/g, ''));
    const row = {};
    headers.forEach((h, i) => {
      let val = values[i] || '';
      // Handle NIP - strip extra quotes and handle scientific notation
      if (h === 'NIP') {
        val = val.replace(/"/g, ''); // Remove all quotes
        if (val.includes('E')) {
          val = String(Math.round(parseFloat(val)));
        }
      }
      // Handle TMT date format (M/D/YYYY to YYYY-MM-DD)
      if (h === 'TMT' || h === 'TMT. PENSIUN') {
        const parts = val.split('/');
        if (parts.length === 3) {
          val = `${parts[2].padStart(4, '20')}-${parts[0].padStart(2, '0')}-${parts[1].padStart(2, '0')}`;
        }
      }
      row[h] = val;
    });
    // Map CSV headers to app fields
    return {
      id: idx + 1,
      Nama: row['Nama'] || '',
      NIP: row['NIP'] || row['No'] || '',
      Pangkat: row['Pangkat'] || '',
      Jabatan: row['Jabatan Terakhir'] || row['Jabatan'] || '',
      TMT: row['TMT'] || row['TMT. PENSIUN'] || '',
      Unit: row['Unit Kerja'] || row['Unit'] || '',
      Operator: row['Operator'] || '',
      StatusPensiun: row['Status Pensiun'] || 'BUP'
    };
  });
};

const loadCSVData = async () => {
  try {
    const response = await fetch('./data_pensiun_2026.csv');
    const text = await response.text();
    return parseCSV(text);
  } catch (e) {
    console.warn('Could not load CSV, using fallback data:', e);
    return null;
  }
};

/* ─── Status Logic ─── */
const getStatusDetail = (pns) => {
  const tmtDate = new Date(pns.TMT);
  const today = new Date();
  const diffMonths = Math.ceil((tmtDate - today) / (1000*60*60*24*30.44));
  if (pns.Status === 'Done') return { urgency:'done', urgencyLabel:'Selesai', keterangan:'BERKAS RAMPUNG: Data telah divalidasi dan diusulkan ke BKN.' };
  if (diffMonths <= 0) return { urgency:'expired', urgencyLabel:'Lewat TMT', keterangan:'PERINGATAN: TMT sudah terlewati. Segera koordinasi Bidang Pensiun.' };
  if (diffMonths <= 3) return { urgency:'sangat-segera', urgencyLabel:'Sangat Segera', keterangan:'TINDAKAN CEPAT: Waktu < 3 Bulan. Kumpulkan Form DPCP hari ini.' };
  if (diffMonths <= 6) return { urgency:'segera', urgencyLabel:'Segera', keterangan:'PERSIAPAN: Sisa 4-6 bulan. Cek SK Pangkat & data keluarga SIASN.' };
  return { urgency:'menunggu', urgencyLabel:'Menunggu', keterangan:'MONITORING: Pastikan data profil di aplikasi sudah mutakhir.' };
};

  });

    const user = USERS[username];

      setIsLoggedIn(true);
      setLoginError('');
    } else {
      setLoginError('Username atau password salah');

    setCurrentUser(null);

    });
  }, []);

    if (csvData) {

        const saved = localStorage.getItem('sipensi_status');
        const map = saved ? JSON.parse(saved) : {};
        setData(csvData.map(d => ({ ...d, Status: map[d.id] ?? 'Pending' })));

    try {
      const map = Object.fromEntries(data.map(d => [d.id, d.Status]));

      const matchStatus = statusFilter === 'all' || (p.StatusPensiun || 'BUP') === statusFilter;

          <div style={{ flex:1 }}>
            <h1 style={{ fontSize:16, fontWeight:900, margin:0, letterSpacing:'-0.03em', display:'flex', alignItems:'center', gap:8 }}>
              <span style={{ color:'#4f46e5' }}>Data Pensiun 2026</span>
              </h1>
            <p style={{ fontSize:10, color:muted, fontWeight:600, margin:0, textTransform:'uppercase', letterSpacing:'0.06em' }}>Monitoring Data · Kota Ternate</p>
          </div>
          <div style={{ display:'flex', alignItems:'center', gap:6, padding:'4px 8px', borderRadius:8, border:`1px solid ${border}`, background:'transparent' }}>
            <div style={{ width:24, height:24, borderRadius:99, background: isAdmin ? '#4f46e5' : '#10b981', display:'flex', alignItems:'center', justifyContent:'center' }}>
              {isAdmin ? <I.shield s={12} st={{ color:'#fff' }}/> : <I.users s={12} st={{ color:'#fff' }}/>}
            </div>
            <div style={{ textAlign:'left' }}>
              <p style={{ fontSize:10, fontWeight:700, color:text, margin:0 }}>{currentUser?.name}</p>
              <p style={{ fontSize:8, fontWeight:600, color: isAdmin ? '#818cf8' : '#34d399', margin:0 }}>{isAdmin ? 'Admin' : 'Petugas'}</p>
            </div>
          </div>
          <button onClick={handleLogout} style={{ padding:7, borderRadius:8, border:`1px solid ${border}`, background:'transparent', cursor:'pointer', display:'flex', alignItems:'center', color:'#94a3b8' }}>
            <I.logout s={16}/>
          </button>
          <button onClick={()=>setDark(!dark)} style={{ padding:7, borderRadius:8, border:`1px solid ${border}`, background:'transparent', cursor:'pointer', display:'flex', alignItems:'center', color:dark?'#fbbf24':'#4f46e5' }}>
            {dark?<I.sun s={16}/>:<I.moon s={16}/>}
          </button>
        </div>

        <div style={{ padding:'16px 20px' }}>

          {/* ══ DASHBOARD TAB ══ */}
          {tab==='dashboard' && (
            <div style={{ display:'flex', flexDirection:'column', gap:16 }}>

              {/* Top stat cards */}
              <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))', gap:10 }}>
                <StatCard label="Total Database" value={total} icon={<I.users s={18}/>} accent="#4f46e5" sub={`${total} Pegawai`}/>
                <StatCard label="BUP" value={bupCount} icon={<I.users s={18}/>} accent="#2563eb" sub={`Batas Usia Pensiun`}/>
                <StatCard label="MD" value={mdCount} icon={<I.users s={18}/>} accent="#dc2626" sub={`Meninggal Dunia`}/>
                <StatCard label="Berkas Selesai" value={done} icon={<I.check2 s={18}/>} accent="#16a34a" sub={`${pct(done)}%`}/>
                <StatCard label="Belum Selesai" value={total-done} icon={<I.clock s={18}/>} accent="#d97706" sub={`${pct(total-done)}%`}/>
                <StatCard label="Sangat Urgent" value={urgent} icon={<I.alert s={18}/>} accent="#dc2626" sub="TMT < 3 bln"/>
                <StatCard label="Lewat TMT" value={expired} icon={<I.xmark s={18}/>} accent="#64748b" sub="Perlu koordinasi segera"/>
              </div>

              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
                {/* Operator performance */}
                <div style={{ background:card, border:`1px solid ${border}`, borderRadius:14, padding:'16px 18px' }}>
                  <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:14 }}>
                    <I.person s={14} st={{ color:'#4f46e5' }}/>
                    <h3 style={{ fontSize:13, fontWeight:800, margin:0 }}>Progress per Operator</h3>
                  </div>
                  <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
                    {opStats.map(({op, total:t, done:d, pct:p}) => (
                      <div key={op}>
                        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:5 }}>
                          <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                            <div style={{ width:10, height:10, borderRadius:99, background:OP_COLORS[op] }}/>
                            <span style={{ fontSize:12, fontWeight:700, color:text }}>{op}</span>
                          </div>
                          <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                            <span style={{ fontSize:11, color:muted, fontWeight:600 }}>{d}/{t}</span>
                            <span style={{ fontSize:11, fontWeight:800, color:OP_COLORS[op] }}>{p}%</span>
                          </div>
                        </div>
                        <Bar pct={p} color={OP_COLORS[op]}/>
                      </div>
                    ))}
                  </div>
                </div>

                {/* Monthly distribution */}
                <div style={{ background:card, border:`1px solid ${border}`, borderRadius:14, padding:'16px 18px' }}>
                  <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:14 }}>
                    <I.calendar s={14} st={{ color:'#4f46e5' }}/>
                    <h3 style={{ fontSize:13, fontWeight:800, margin:0 }}>Distribusi per Bulan TMT</h3>
                  </div>
                  <div style={{ display:'flex', flexDirection:'column', gap:7 }}>
                    {monthStats.map(({m, label, count, done:d}) => (
                      <div key={m} style={{ display:'flex', alignItems:'center', gap:8 }}>
                        <span style={{ fontSize:11, fontWeight:700, color:muted, width:28, flexShrink:0 }}>{label}</span>
                        <div style={{ flex:1, display:'flex', alignItems:'center', gap:6 }}>
                          <div style={{ height:14, display:'flex', borderRadius:4, overflow:'hidden', gap:1, flex:1 }}>
                            <div style={{ background:'#4ade80', width:`${Math.round((d/count)*100)}%`, minWidth:d>0?4:0 }}/>
                            <div style={{ background:'#c7d2fe', flex:1 }}/>
                          </div>
                          <span style={{ fontSize:10, fontWeight:700, color:muted, width:20, textAlign:'right', flexShrink:0 }}>{count}</span>
                        </div>
                      </div>
                    ))}
                    <div style={{ display:'flex', alignItems:'center', gap:12, marginTop:4, paddingTop:10, borderTop:`1px solid ${border}` }}>
                      <div style={{ display:'flex', alignItems:'center', gap:4 }}><div style={{ width:10,height:10,background:'#4ade80',borderRadius:2 }}/><span style={{ fontSize:10, color:muted, fontWeight:600 }}>Selesai</span></div>
                      <div style={{ display:'flex', alignItems:'center', gap:4 }}><div style={{ width:10,height:10,background:'#c7d2fe',borderRadius:2 }}/><span style={{ fontSize:10, color:muted, fontWeight:600 }}>Belum</span></div>
                    </div>
                  </div>
                </div>
              </div>

              {/* Urgency breakdown */}
              <div style={{ background:card, border:`1px solid ${border}`, borderRadius:14, padding:'16px 18px' }}>
                <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:14 }}>
                  <I.bar s={14} st={{ color:'#4f46e5' }}/>
                  <h3 style={{ fontSize:13, fontWeight:800, margin:0 }}>Distribusi Urgensi</h3>
                </div>
                <div style={{ display:'grid', gridTemplateColumns:'repeat(5,1fr)', gap:8 }}>
                  {[
                    { key:'done',         label:'Selesai',       accent:'#16a34a', bg:'#f0fdf4' },
                    { key:'menunggu',     label:'Menunggu',      accent:'#4338ca', bg:'#eef2ff' },
                    { key:'segera',       label:'Segera',        accent:'#d97706', bg:'#fffbeb' },
                    { key:'sangat-segera',label:'Sangat Segera', accent:'#dc2626', bg:'#fef2f2' },
                    { key:'expired',      label:'Lewat TMT',     accent:'#475569', bg:'#f8fafc' },
                  ].map(({key, label, accent, bg:ubg}) => {
                    const n = processed.filter(d => key==='done' ? d.Status==='Done' : d.urgency===key && d.Status!=='Done').length;
                    return (
                      <div key={key} style={{ background:ubg, borderRadius:10, padding:'12px', textAlign:'center', border:`1px solid ${accent}22` }}>
                        <p style={{ fontSize:22, fontWeight:900, color:accent, margin:0, lineHeight:1 }}>{n}</p>
                        <p style={{ fontSize:10, color:accent, fontWeight:700, margin:'4px 0 0', opacity:0.8 }}>{label}</p>
                        <p style={{ fontSize:10, color:accent, opacity:0.6, margin:'2px 0 0', fontWeight:600 }}>{pct(n)}%</p>
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* Operator detail table */}
              <div style={{ background:card, border:`1px solid ${border}`, borderRadius:14, padding:'16px 18px' }}>
                <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:12 }}>
                  <I.users s={14} st={{ color:'#4f46e5' }}/>
                  <h3 style={{ fontSize:13, fontWeight:800, margin:0 }}>Rekapitulasi per Operator</h3>
                </div>
                <table style={{ width:'100%', borderCollapse:'collapse', fontSize:12 }}>
                  <thead>
                    <tr style={{ background:dark?'#0f172a':'#f8fafc' }}>
                      {['Operator','Total','Selesai','Belum','Sangat Urgent','Progress'].map((h,i) => (
                        <th key={i} style={{ padding:'8px 12px', fontWeight:700, color:muted, textAlign:i===0?'left':'center', fontSize:11, textTransform:'uppercase', letterSpacing:'0.05em', borderBottom:`1px solid ${border}` }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {opStats.map(({op, total:t, done:d}) => {
                      const urgN = processed.filter(x=>x.Operator===op&&x.urgency==='sangat-segera'&&x.Status!=='Done').length;
                      const p2 = t?Math.round((d/t)*100):0;
                      return (
                        <tr key={op} style={{ borderBottom:`1px solid ${border}` }}>
                          <td style={{ padding:'9px 12px' }}>
                            <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                              <div style={{ width:8,height:8,background:OP_COLORS[op],borderRadius:99,flexShrink:0 }}/>
                              <span style={{ fontWeight:700 }}>{op}</span>
                            </div>
                          </td>
                          <td style={{ textAlign:'center', fontWeight:700, padding:'9px 12px' }}>{t}</td>
                          <td style={{ textAlign:'center', padding:'9px 12px' }}><span style={{ background:'#f0fdf4', color:'#16a34a', padding:'2px 8px', borderRadius:5, fontWeight:700, fontSize:11 }}>{d}</span></td>
                          <td style={{ textAlign:'center', padding:'9px 12px' }}><span style={{ background:'#fffbeb', color:'#d97706', padding:'2px 8px', borderRadius:5, fontWeight:700, fontSize:11 }}>{t-d}</span></td>
                          <td style={{ textAlign:'center', padding:'9px 12px' }}><span style={{ background: urgN>0?'#fef2f2':'#f0fdf4', color:urgN>0?'#dc2626':'#94a3b8', padding:'2px 8px', borderRadius:5, fontWeight:700, fontSize:11 }}>{urgN}</span></td>
                          <td style={{ padding:'9px 12px' }}>
                            <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                              <Bar pct={p2} color={OP_COLORS[op]}/>
                              <span style={{ fontSize:11, fontWeight:800, color:OP_COLORS[op], width:32, textAlign:'right' }}>{p2}%</span>
                            </div>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {/* ══ MONITORING TAB ══ */}
          {tab==='monitoring' && (
            <div>
              {/* Filter bar */}
              <div style={{ background:card, border:`1px solid ${border}`, borderRadius:12, padding:'10px 14px', marginBottom:12, display:'flex', flexWrap:'wrap', gap:8, alignItems:'center' }}>
                <div style={{ position:'relative', flex:'1 1 200px', minWidth:160 }}>
                  <span style={{ position:'absolute', left:10, top:'50%', transform:'translateY(-50%)', color:muted, display:'flex', pointerEvents:'none' }}><I.search s={14}/></span>
                  <input type="text" placeholder="Cari nama atau operator…" value={q} onChange={e=>setQ(e.target.value)}
                    style={{ ...selStyle, paddingLeft:30, width:'100%' }} />
                </div>
                <select value={filterOp} onChange={e=>setFilterOp(e.target.value)} style={selStyle}>
                  <option value="">Total Semua</option>
                  {OPERATORS.map(op=><option key={op} value={op}>{op}</option>)}
                </select>
                <select value={filterMonth} onChange={e=>setFilterMonth(e.target.value)} style={selStyle}>
                  <option value="">Semua Bulan TMT</option>
                  {Array.from({length:12},(_,i)=><option key={i+1} value={i+1}>{MONTHS[i+1]}</option>)}
                </select>
                <select value={statusFilter} onChange={e=>setStatusFilter(e.target.value)} style={selStyle}>
                  <option value="all">Semua Jenis ({total})</option>
                  <option value="BUP">BUP ({bupCount})</option>
                  <option value="MD">MD ({mdCount})</option>
                </select>

                {(q||filterOp||filterMonth||statusFilter!=='all') && (
                  <button onClick={()=>{setQ('');setFilterOp('');setFilterMonth('');setStatusFilter('all');}} style={{ padding:'7px 12px', borderRadius:8, border:`1px solid ${border}`, background:'transparent', cursor:'pointer', color:'#dc2626', fontSize:11, fontWeight:700, display:'flex', alignItems:'center', gap:4 }}>
                    <I.xmark s={12}/> Reset
                  </button>
                )}
                <button onClick={()=>{
                  const headers = ['No','Nama','Pangkat','Jabatan','Unit Kerja','TMT','Status Pensiun','Status Monitoring','Urgensi'];
                  const csvContent = [
                    headers.join(','),
                    ...filtered.map((p, idx) => [
                      idx + 1,
                      `"${p.Nama}"`,
                      `"${p.Pangkat}"`,
                      `"${p.Jabatan}"`,
                      `"${p.Unit}"`,
                      p.TMT,
                      p.StatusPensiun || 'BUP',
                      p.Status === 'Done' ? 'Selesai' : 'Pending',
                      p.urgencyLabel
                    ].join(','))
                  ].join('\n');
                  const blob = new Blob(['\ufeff' + csvContent], { type: 'text/csv;charset=utf-8;' });
                  const link = document.createElement('a');
                  const url = URL.createObjectURL(blob);
                  link.href = url;
                  link.download = `sipensi_monitoring_${new Date().toISOString().split('T')[0]}.csv`;
                  link.click();
                }} style={{ padding:'7px 14px', borderRadius:8, border:'none', background:'#16a34a', cursor:'pointer', color:'#fff', fontSize:11, fontWeight:700, display:'flex', alignItems:'center', gap:4 }}>
                  <I.clip s={12}/> Export
                </button>
                <span style={{ fontSize:11, color:muted, fontWeight:600, marginLeft:'auto' }}>
                  {filtered.length} dari {total} pegawai
                </span>
              </div>

              {/* Table */}
              <div style={{ background:card, border:`1px solid ${border}`, borderRadius:12, overflow:'hidden' }}>
                <div style={{ overflowX:'auto' }}>
                  <table style={{ width:'100%', borderCollapse:'collapse', fontSize:12 }}>
                    <thead style={{ background:dark?'#0f172a':'#f8fafc', position:'sticky', top:0, zIndex:1 }}>
                      <tr>
                        {['No','Nama / Jabatan','Status','Unit / TMT','Operator','Urgensi','Keterangan','✓'].map((h,i)=>(
                          <th key={i} style={{ padding:'10px 12px', fontWeight:700, color:muted, textAlign:i===0||i>=5?'center':'left', fontSize:10, textTransform:'uppercase', letterSpacing:'0.05em', whiteSpace:'nowrap', borderBottom:`1px solid ${border}` }}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {paginatedData.map((p, idx) => (
                        <tr key={p.id} style={{ borderBottom:`1px solid ${border}`, background: p.Status==='Done'?(dark?'rgba(16,185,129,0.05)':'#f0fdf4'):'transparent', transition:'background 0.15s' }}
                          onMouseEnter={e=>{ if(p.Status!=='Done') e.currentTarget.style.background=dark?'rgba(99,102,241,0.05)':'#f8f8ff'; }}
                          onMouseLeave={e=>{ e.currentTarget.style.background=p.Status==='Done'?(dark?'rgba(16,185,129,0.05)':'#f0fdf4'):'transparent'; }}>

                          <td style={{ padding:'8px 12px', textAlign:'center', fontWeight:700, color:muted, fontSize:11 }}>{(currentPage - 1) * itemsPerPage + idx + 1}</td>

                          <td style={{ padding:'8px 12px', maxWidth:200 }}>
                            <p style={{ margin:0, fontWeight:700, fontSize:12, color:'#4f46e5', lineHeight:1.3 }}>{p.Nama}</p>
                            <p style={{ margin:'2px 0 0', fontSize:10, color:muted, fontWeight:600 }}>{p.Pangkat} · {p.Jabatan}</p>
                          </td>

                          <td style={{ padding:'8px 12px', textAlign:'center' }}>
                            <span style={{
                              padding:'3px 8px', borderRadius:99, fontSize:10, fontWeight:800,
                              background: p.StatusPensiun === 'MD' ? '#fef2f2' : '#eff6ff',
                              color: p.StatusPensiun === 'MD' ? '#dc2626' : '#2563eb'
                            }}>
                              {p.StatusPensiun === 'MD' ? 'Meninggal Dunia' : 'Batas Usia Pensiun'}
                            </span>
                          </td>

                          <td style={{ padding:'8px 12px', maxWidth:180 }}>
                            <p style={{ margin:0, fontSize:11, fontWeight:700, color:text, lineHeight:1.3 }}>{p.Unit}</p>
                            <p style={{ margin:'2px 0 0', fontSize:10, color:'#6366f1', fontWeight:700, display:'flex', alignItems:'center', gap:3 }}>
                              <I.clock s={10}/> {p.TMT}
                            </p>
                          </td>

                          <td style={{ padding:'8px 12px', textAlign:'center' }}>
                            <span style={{ background:OP_BG[p.Operator]||'#f8fafc', color:OP_COLORS[p.Operator]||'#64748b', border:`1px solid ${OP_COLORS[p.Operator]}33`, padding:'3px 8px', borderRadius:6, fontSize:10, fontWeight:800, whiteSpace:'nowrap', display:'inline-block' }}>
                              {p.Operator}
                            </span>
                          </td>

                          <td style={{ padding:'8px 12px', textAlign:'center' }}>
                            <Badge type={p.urgency} label={p.urgencyLabel}/>
                          </td>

                          <td style={{ padding:'8px 12px', maxWidth:220 }}>
                            <p style={{ margin:0, fontSize:10, color:p.Status==='Done'?'#16a34a':muted, fontWeight:600, lineHeight:1.4 }}>{p.keterangan}</p>
                          </td>

                          <td style={{ padding:'8px 12px', textAlign:'center' }}>
                            <button onClick={()=>toggle(p.id)} title={p.Status==='Done'?'Tandai Pending':'Tandai Selesai'}
                              style={{ padding:6, borderRadius:8, border:'none', cursor: isAdmin ? 'pointer' : 'not-allowed', background:p.Status==='Done'?'#16a34a':'transparent', color:p.Status==='Done'?'#fff':muted, display:'flex', alignItems:'center', boxShadow:p.Status==='Done'?'0 2px 8px rgba(22,163,74,0.3)':'none', borderWidth:1, borderStyle:'solid', borderColor:p.Status==='Done'?'#16a34a':border, opacity: isAdmin ? 1 : 0.5 }}>
                              <I.clip s={15}/>
                            </button>
                          </td>
                        </tr>
                      ))}
                      {filtered.length===0 && (
                        <tr><td colSpan={8} style={{ padding:'32px', textAlign:'center', color:muted, fontWeight:600 }}>Tidak ada data yang sesuai filter</td></tr>
                      )}
                    </tbody>
                  </table>
                </div>
              </div>

              {/* Pagination */}
              {totalPages > 1 && (
                <div style={{ display:'flex', justifyContent:'center', alignItems:'center', gap:8, marginTop:16, padding:'12px', background:card, border:`1px solid ${border}`, borderRadius:12 }}>
                  <button
                    onClick={()=>setCurrentPage(p=>Math.max(1,p-1))}
                    disabled={currentPage===1}
                    style={{ padding:'6px 12px', borderRadius:8, border:`1px solid ${border}`, background:currentPage===1?'transparent':(dark?'#1e293b':'#fff'), color:currentPage===1?muted:text, cursor:currentPage===1?'not-allowed':'pointer', fontSize:12, fontWeight:700, display:'flex', alignItems:'center', gap:4, opacity:currentPage===1?0.5:1 }}
                  >
                    ← Prev
                  </button>
                  <span style={{ fontSize:12, fontWeight:700, color:muted, padding:'0 8px' }}>
                    Halaman {currentPage} dari {totalPages}
                  </span>
                  <button
                    onClick={()=>setCurrentPage(p=>Math.min(totalPages,p+1))}
                    disabled={currentPage===totalPages}
                    style={{ padding:'6px 12px', borderRadius:8, border:`1px solid ${border}`, background:currentPage===totalPages?'transparent':(dark?'#1e293b':'#fff'), color:currentPage===totalPages?muted:text, cursor:currentPage===totalPages?'not-allowed':'pointer', fontSize:12, fontWeight:700, display:'flex', alignItems:'center', gap:4, opacity:currentPage===totalPages?0.5:1 }}
                  >
                    Next →
                  </button>
                </div>
              )}

              {/* Footer */}
              <div style={{ textAlign:'center', padding:'20px', marginTop:8, color:muted, fontSize:11, fontWeight:600 }}>
                Created by Dika Haryanto 2026
              </div>
            </div>
          )}
        </div>
      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
